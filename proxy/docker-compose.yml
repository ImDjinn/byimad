# Edge reverse-proxy partagé.
#
# C'est le SEUL service qui écoute sur 80/443 sur le VPS. Il termine le TLS
# (Let's Encrypt, automatique) et route chaque domaine vers le conteneur de
# l'application correspondante, joint au réseau Docker partagé `web`. Chaque
# application (byimad, Moires, …) reste un stack autonome derrière cet edge.
#
# Prérequis (une fois) :
#   docker network create web
#
# Démarrer :
#   docker compose -f proxy/docker-compose.yml up -d
services:
  edge:
    image: caddy:2-alpine
    container_name: edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Répertoire entier, pas le fichier seul : un `git pull` remplace le
      # Caddyfile par un NOUVEL inode, et un bind-mount de fichier resterait
      # accroché à l'ancien — les changements ne seraient jamais vus.
      - .:/etc/caddy:ro
      # Releases Parthenon (installeurs + manifestes latest.yml) : dossiers
      # remplis par la CI Parthenon (scp). Voir le repo Parthenon
      # (docs/RELEASE_VARIANTS.md). releases-al = canal AL protégé (Basic auth).
      - /opt/parthenon-releases:/srv/parthenon-releases:ro
      - /opt/parthenon-releases-al:/srv/parthenon-releases-al:ro
      # Wiki Agora (build Quartz) : rempli par la CI byimad (agora.yml, rsync).
      - /opt/agora-site:/srv/agora-site:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

networks:
  web:
    external: true

volumes:
  caddy_data:
  caddy_config:
