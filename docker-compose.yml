# Stack autonome du portail byimad.net.
#
# Sert la landing (index.html) et la page de présentation Parthenon
# (parthenon/index.html), en HTTP interne uniquement : l'edge proxy (voir
# ./proxy) termine le TLS et route les domaines vers ce conteneur via le
# réseau partagé `web`.
#
# Prérequis (une fois) :
#   docker network create web
#
# Démarrer :
#   docker compose up -d
#
# Mettre à jour le contenu : `git pull` PUIS `docker compose up -d
# --force-recreate` (deploy.yml s'en charge). Le pull remplace index.html par
# un nouvel inode : le bind-mount de FICHIER reste accroché à l'ancien tant
# que le conteneur n'est pas recréé (./parthenon, monté en répertoire, ne
# souffre pas de ce problème).
services:
  site:
    image: caddy:2-alpine
    container_name: byimad-site
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # On ne monte que le contenu public : pas le .git ni les fichiers d'infra.
      - ./index.html:/srv/index.html:ro
      - ./parthenon:/srv/parthenon:ro
    # wget vient de busybox (image alpine). L'edge ne route pas vers un
    # conteneur non « healthy » au démarrage.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - web

networks:
  web:
    external: true
